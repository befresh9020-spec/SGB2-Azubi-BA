<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="Interaktiver SGB II Vermögensrechner im Terminal-Design">
  <title>SGB II Vermögensanrechnung – § 12 Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #050b15;
  --bg-panel: rgba(10, 20, 35, 0.92);
  --primary: #00e5ff;
  --primary-dim: rgba(0, 229, 255, 0.1);
  --primary-glow: rgba(0, 229, 255, 0.5);
  --text-main: #e0e8f0;
  --text-dim: #8b9dc3;
  --success: #00ff9c;
  --warning: #ffb300;
  --danger: #ff3838;
  --border: rgba(0, 229, 255, 0.3);
  --font-tech: "Orbitron", sans-serif;
  --font-mono: "Roboto Mono", monospace;
}

[data-theme="orange"] {
  --primary: #ff9500;
  --primary-dim: rgba(255, 149, 0, 0.1);
  --primary-glow: rgba(255, 149, 0, 0.5);
  --border: rgba(255, 149, 0, 0.3);
}

[data-theme="green"] {
  --primary: #00ff88;
  --primary-dim: rgba(0, 255, 136, 0.1);
  --primary-glow: rgba(0, 255, 136, 0.5);
  --border: rgba(0, 255, 136, 0.3);
}

.status-offen { color: var(--text-dim); }
.status-bestanden { color: var(--success); }
.status-fehlerhaft { color: var(--danger); }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg-dark);
  color: var(--text-main);
  font-family: var(--font-tech);
  min-height: 100vh;
  /* Verhindert horizontales Scrollen auf Mobile */
  overflow-x: hidden; 
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ─── HINTERGRUND & EFFEKTE ─── */
#bg-canvas {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: -2;
}

.scanlines {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
  background-size: 100% 4px;
  pointer-events: none;
  z-index: 999;
  opacity: 0.4;
}

.vignette {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.8) 100%);
  pointer-events: none;
  z-index: 998;
}

/* ─── UI COMPONENTS ─── */
.top-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 0;
  background: rgba(0,0,0,0.8);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(5px);
  position: sticky;
  top: 0;
  z-index: 1000; /* Höherer Z-Index für Mobile Header */
}

.theme-switch {
  display: flex;
  gap: 20px;
}

.theme-btn {
  background: transparent;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  width: 36px; height: 36px; /* Größere Touch-Targets */
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
  display: grid;
  place-items: center;
  font-size: 1.2rem;
}
.theme-btn:hover, .theme-btn:focus { border-color: var(--text-main); color: var(--text-main); outline: none; }
.theme-btn.active { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

/* ─── MAIN CONTAINER ─── */
.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 0 15px; /* Etwas weniger Padding auf Mobile */
  padding-bottom: 40px;
}

.terminal-window {
  background: var(--bg-panel);
  border: 1px solid var(--border); /* Dünnerer Rand sieht eleganter aus */
  box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 50px var(--primary-dim);
  position: relative;
  backdrop-filter: blur(10px);
  border-radius: 4px;
}

.terminal-header {
  padding: 15px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(90deg, var(--primary-dim) 0%, transparent 100%);
  display: flex;
  flex-direction: column;
}

.terminal-title {
  font-size: 1.2rem;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow: 0 0 10px var(--primary-glow);
  margin-bottom: 5px;
	text-align: center;
}

.terminal-subtitle {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
	text-align: center;
}

.terminal-content {
  padding: 20px;
}

/* ─── PROGRESS ─── */
.progress-container {
  margin-bottom: 25px;
}
.progress-bar {
  height: 4px;
  background: rgba(255,255,255,0.1);
  width: 100%;
  margin-top: 8px;
  position: relative;
  border-radius: 2px;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  width: 0%;
  transition: width 0.5s ease;
  box-shadow: 0 0 8px var(--primary);
}
.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: uppercase;
  font-family: var(--font-mono);
}

/* ─── CONTENT BLOCKS ─── */
.case-box {
  background: rgba(0,0,0,0.3);
  border-left: 3px solid var(--primary);
  padding: 15px;
  margin-bottom: 25px;
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: var(--text-main);
  line-height: 1.6;
}

/* Responsive Table */
.table-wrapper {
  overflow-x: auto; /* Erlaubt scrollen bei sehr kleinen Screens */
  margin-bottom: 25px;
}

.asset-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.85rem;
}
.asset-table th {
  text-align: left;
  border-bottom: 2px solid var(--border);
  padding: 10px 5px;
  color: var(--primary);
  text-transform: uppercase;
  white-space: nowrap;
}
.asset-table td {
  padding: 12px 5px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: var(--text-main);
}
.asset-amount {
  text-align: right;
  color: var(--success);
  font-weight: bold;
  white-space: nowrap;
}

/* ─── QUESTIONS ─── */
.question-group {
  margin-bottom: 35px;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.5s forwards;
}
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

.q-label {
  font-size: 0.7rem;
  color: var(--warning);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  display: block;
  font-weight: bold;
}

.q-title {
  font-size: 1rem;
  margin-bottom: 12px;
  font-weight: 500;
}

.options-grid {
  display: grid;
  gap: 12px;
}

.option-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  padding: 15px;
  text-align: left;
  color: var(--text-dim);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.9rem;
  transition: all 0.2s;
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 50px; /* Besser für Touch */
  user-select: none;
}

.option-btn:hover {
  background: var(--primary-dim);
  border-color: var(--primary);
  color: var(--text-main);
}

/* Aktiver Status auch für Touch (Active/Focus) */
.option-btn:active {
  background: var(--primary-dim);
}

.option-btn.selected {
  background: var(--primary-dim);
  border-color: var(--primary);
  color: var(--primary);
  box-shadow: inset 3px 0 0 var(--primary);
}

.checkbox-indicator {
  width: 18px; height: 18px;
  border: 1px solid var(--text-dim);
  flex-shrink: 0; /* Verhindert Quetschen */
  margin-left: 10px;
  transition: 0.2s;
}
.option-btn.selected .checkbox-indicator {
  background: var(--primary);
  border-color: var(--primary);
  box-shadow: 0 0 8px var(--primary);
}

/* ─── INPUT FIELD ─── */
.input-wrapper {
  margin-top: 10px;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  border: 1px dashed var(--border);
}

.calc-input {
  background: #000;
  border: 1px solid var(--primary);
  color: var(--success);
  font-family: var(--font-mono);
  font-size: 1.1rem; /* 16px Minimum verhindert iOS Zoom */
  padding: 12px;
  width: 100%;
  outline: none;
  text-align: right;
  border-radius: 0;
  appearance: none; /* Entfernt Default-Styling auf iOS */
}
.calc-input::placeholder { color: #444; }
.calc-input:focus { box-shadow: 0 0 15px var(--primary-dim); }

/* ─── CONTROLS ─── */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.btn-main {
  padding: 15px;
  background: transparent;
  border: 2px solid var(--primary);
  color: var(--primary);
  font-family: var(--font-tech);
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.3s;
  min-height: 54px; /* Touch friendly */
  display: grid;
  place-items: center;
}

.btn-main:hover, .btn-main:focus {
  background: var(--primary);
  color: #000;
  box-shadow: 0 0 20px var(--primary-glow);
  outline: none;
}

.btn-main:disabled {
  border-color: #333;
  color: #555;
  cursor: not-allowed;
  box-shadow: none;
  background: transparent;
}

/* ─── FEEDBACK ─── */
.feedback-area {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.feedback-card {
  padding: 15px;
  border: 1px solid;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  background: rgba(0,0,0,0.6);
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

.fb-correct { border-color: var(--success); color: var(--success); }
.fb-wrong { border-color: var(--danger); color: var(--danger); }

.math-detail {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  color: var(--text-main);
  border-left: 2px solid currentColor;
  line-height: 1.4;
}

/* ─── MEDIA QUERIES (MOBILE OPTIMIZATION) ─── */
@media (max-width: 600px) {
  .container {
    margin: 10px auto;
    padding: 0 10px;
  }
  
  .terminal-content {
    padding: 15px;
  }

  .terminal-title {
    font-size: 1rem;
  }

  .controls {
    grid-template-columns: 1fr; /* Buttons untereinander auf Handy */
  }

  .asset-table th, .asset-table td {
    padding: 8px 4px;
    font-size: 0.8rem;
  }
  
  .option-btn {
    padding: 12px;
    font-size: 0.85rem;
  }
}
</style>
</head>
<body data-theme="blue">

<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="top-bar">
  <div class="theme-switch">
    <button class="theme-btn active" onclick="setTheme('blue')" aria-label="Theme Blau">●</button>
    <button class="theme-btn" onclick="setTheme('orange')" aria-label="Theme Orange">●</button>
    <button class="theme-btn" onclick="setTheme('green')" aria-label="Theme Grün">●</button>
  </div>
</div>

<div class="container">
  <main class="terminal-window">
    <header class="terminal-header">
      <div class="terminal-title">SGB II</div>
      <div class="terminal-subtitle">§ 12 - Terminal Vermögen</div>
    </header>

    <div class="terminal-content" id="app-content">
      </div>
  </main>
</div>

<script>
// =============================================
// KONFIGURATION & DATEN
// =============================================

const cases = [
  {
    id: 1,
    text: "Herr Nowak (41, alleinstehend, eLb) stellt einen Weiterbewilligungsantrag auf Bürgergeld (Bezug seit 01.01.2023). Er gibt folgende Werte an:",
    assets: [
      { name: "Sparbuch", val: 1200 },
      { name: "PKW (Zeitwert)", val: 5800 },
      { name: "Aktien-Depot", val: 8500 }

    steps: [
      {
        type: "multi",
        label: "Schritt 1: Verwertbares Vermögen<br> nach § 12 Abs. 1 S. 1 SGB II",

        options: [
          { txt: "Sparbuch (1.200 €)", correct: true },
          { txt: "PKW (5.800 €)", correct: true },
          { txt: "Aktien-Depot (8.500 €)", correct: true }
        ],
        explain: "Alle Vermögenswerte sind hier grundsätzlich verwertbar."
      },
      {
        type: "single",
        label: "Schritt 2: Schonvermögen",
        text: "Welcher Gegenstand ist vollständig geschützt (nicht zu berücksichtigen?",
        options: [
          { txt: "PKW", correct: true },
          { txt: "Sparbuch bis 15.000 €", correct: false },
          { txt: "Aktien-Depot, da unter 40.000 €", correct: false }
        ],
        explain: "Ein angemessenes Kraftfahrzeug für jede erwerbsfähige Person in der Bedarfsgemeinschaft ist nicht als Vermögen zu berücksichtigen. Ist ein Verkaufserlös abzüglich ggf. noch bestehender Kreditverbindlichkeiten von maximal 15.000,00 EUR erreichbar, ist von Angemessenheit auszugehen."
      },
      {
        type: "input",
        label: "Schritt 3: Berechnung",
        text: "Wie hoch ist das anzurechnende Vermögen (nach Abzug Freibetrag)?",
        hint: "Sparbuch + Aktien - 15.000 €",
        correctVal: 0, 
        // WICHTIG: Das Ergebnis ist rechnerisch negativ (-5300), aber im SGB II wird 0 angerechnet.
        // Um Verwirrung zu vermeiden, akzeptieren wir hier 0 oder den negativen Wert.
        altCorrectVal: -5300,
        explain: "Gesamt: 9.700 € (1.200 + 8.500). Freibetrag: 15.000 €. Da das Vermögen unter dem Freibetrag liegt, ergibt sich kein anzurechnendes Vermögen."
      }
    ]
  },
  {
    id: 2,
    text: "Ehepaar Kowalski (beide 45) stellt erstmalig einen Antrag auf Bürgergeld. Vermögenssituation:",
    assets: [
      { name: "Gemeinschaftskonto", val: 42000 },
      { name: "Riester-Rente (Frau K.)", val: 9200 },
      { name: "Schmuck (Erbstück)", val: 6500 }
    ],
    steps: [
      {
        type: "multi",
        label: "Schritt 1: Verwertbares Vermögen<br> nach § 12 Abs. 1 S. 1 SGB II",
        text: "Was zählt hier zum grundsätzlich zu berücksichtigenden Vermögen?",
        options: [
          { txt: "Gemeinschaftskonto", correct: true },
          { txt: "Riester-Rente", correct: true },
          { txt: "Schmuck (Erbstück)", correct: true }
        ],
        explain: "Alle angegebenen Vermögenswerte sind grundsätzlich verwertbar."
      },
      {
        type: "multi",
        label: "Schritt 2: Schonvermögen",
        text: "Welche Gegenstände sind vollständig geschützt (nicht zu berücksichtigen)?",
        options: [
          { txt: "Gemeinschaftskonto", correct: false },
          { txt: "Riester-Rente", correct: true },
          { txt: "Schmuck (Erbstück)", correct: true }
        ],
        explain: "Die Riesterrente (§ 12 Abs. 1 S. 2 Nr. 3 SGB II) und angemessene Erbstücke (§ 12 Abs. 1 S. 2 Nr. 7 i.V.m. Fachlicher Weisung) sind geschützt."
      },
      {
        type: "input",
        label: "Schritt 3: Berechnung",
        text: "Wie hoch ist das anzurechnende Vermögen (nach Abzug Freibetrag)?",
        correctVal: 0,
        altCorrectVal: -13000, 
        explain: "42.000 € (Konto) abzüglich 55.000 € Karenzzeit-Freibetrag (40.000 + 15.000). Ergebnis ist negativ bzw. 0 €."
      }
    ]
  },
	{
    id: 3,
    text: "Herr Schubert (alleinstehend, 49, eLb) stellt einen Weiterbewilligungsantrag auf Bürgergeld (Bezug seit 1. Juli 2024). In der Anlage VM macht er folgende Angaben:",
    assets: [
      { name: "Bargeld", val: 150 },
      { name: "Fernseher (115 Zoll) Samsung Neo QLED 4K", val: 7500 },
      { name: "PKW (gepfändet)", val: 12500 }
    ],
    steps: [
      {
        type: "multi",
        label: "Schritt 1: Verwertbares Vermögen<br> nach § 12 Abs. 1 S. 1 SGB II",
        text: "Was zählt hier zum grundsätzlich zu berücksichtigenden Vermögen?",
        options: [
          { txt: "Bargeld", correct: true },
          { txt: "Fernseher", correct: true },
          { txt: "PKW", correct: false }
        ],
        explain: "Der PKW ist gepfändet und deshalb nicht verwertbar."
      },
      {
        type: "multi",
        label: "Schritt 2: Schonvermögen",
        text: "Welche Gegenstände sind vollständig geschützt (nicht zu berücksichtigen)?",
        options: [
          { txt: "Bargeld", correct: false },
          { txt: "Fernseher", correct: true },
          { txt: "PKW", correct: false }
        ],
        explain: "Der Fernseher (§ 12 Abs. 1 S. 2 Nr. 1 SGB II i.V.m. Fachlicher Weisung) ist geschützt."
      },
      {
        type: "input",
        label: "Schritt 3: Berechnung",
        text: "Wie hoch ist das anzurechnende Vermögen (nach Abzug Freibetrag)?",
        correctVal: 0,
        altCorrectVal: -14850, 
        explain: "150 € Bargeld abzüglich 15.000 € Freibetrag ergibt kein anzurechnendes Vermögen."
      }
    ]
  },
	{
    id: 4,
    text: "Herr Svensson (24, eLb) stellt einen Weiterbewilligungsantrag auf Bürgergeld (Bezug seit 1. Dezember 2024). Zur Bedarfsgemeinschaft gehört der Sohn (2). Zum Vermögen macht er folgende Angaben:",
    assets: [
      { name: "Tagesgeldkonto", val: 15000 },
      { name: "Bausparvertrag", val: 17500 },
      { name: "Eigentumswohnung (75qm)", val: 200000 }
    ],
    steps: [
      {
        type: "multi",
        label: "Schritt 1: Verwertbares Vermögen<br> nach § 12 Abs. 1 S. 1 SGB II",
        text: "Was zählt hier zum grundsätzlich zu berücksichtigenden Vermögen?",
        options: [
          { txt: "Tagesgeldkonto", correct: true },
          { txt: "Bausparvertrag", correct: true },
          { txt: "Eigentumswohnung", correct: true }
        ],
        explain: "Alle Vermögenswerte sind verwertbar."
      },
      {
        type: "multi",
        label: "Schritt 2: Schonvermögen",
        text: "Welche Gegenstände sind vollständig geschützt (nicht zu berücksichtigen)?",
        options: [
          { txt: "Tagesgeldkonto", correct: false },
          { txt: "Bausparvertrag", correct: false },
          { txt: "Eigentumswohnung", correct: true }
        ],
        explain: "Eine selbst genutzte Eigentumswohnung von bis zu 130 Quadratmetern ist nicht als Vermögen zu berücksichtigen."
      },
      {
        type: "input",
        label: "Schritt 3: Berechnung",
        text: "Wie hoch ist das anzurechnende Vermögen (nach Abzug Freibetrag)?",
        correctVal: 2500, 
        explain: "32.500 € (15.000 + 17.500) abzüglich 30.000 € Freibetrag ergibt ein anzurechnendes Vermögen in Höhe von 2.500 €."
      }
    ]
  }
];

// =============================================
// STATE & LOGIC
// =============================================
let currentCaseIndex = 0;
let caseStatus = "Offen"; // Offen | Bestanden | Fehlerhaft

function init() {
  renderCase();
  requestAnimationFrame(animateCanvas);
}

function renderCase() {
  const data = cases[currentCaseIndex];
  const content = document.getElementById('app-content');
  
  // Progress Header
  let html = `
    <div class="progress-container">
      <div class="progress-text">
        <span>Fall-Akte ${currentCaseIndex + 1} / ${cases.length}</span>
        <span id="progress-status" class="status-${caseStatus.toLowerCase()}">
  Status: ${caseStatus}
</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${(currentCaseIndex / cases.length) * 100}%"></div>
      </div>
    </div>
  `;

  // Fall Text
  html += `
    <div class="case-box">
      <strong>Sachverhalt:</strong><br>${data.text}
    </div>
  `;

  // Tabelle
  html += `<div class="table-wrapper"><table class="asset-table"><thead><tr><th>Vermögensgegenstand</th><th style="text-align:right">Wert</th></tr></thead><tbody>`;
  data.assets.forEach(a => {
    html += `<tr><td>${a.name}</td><td class="asset-amount">${a.val.toLocaleString('de-DE')} €</td></tr>`;
  });
  html += `</tbody></table></div>`;

  // Fragen
  html += `<div id="questions-container">`;
  data.steps.forEach((step, idx) => {
    html += renderStep(step, idx);
  });
  html += `</div>`;

  // Controls
  html += `
    <div class="feedback-area" id="feedback-area"></div>
    <div class="controls">
      <button class="btn-main" onclick="checkCase()" id="btn-check">Fall Prüfen</button>
      <button class="btn-main" onclick="nextCase()" id="btn-next" disabled>Nächster Fall</button>
    </div>
  `;

  content.innerHTML = html;
}

function renderStep(step, stepIdx) {
  let html = `
    <div class="question-group">
      <span class="q-label">${step.label}</span>
      <div class="q-title">${step.text}</div>
  `;

  if (step.type === 'input') {
    // Input Step
    html += `
      <div class="input-wrapper">
        <input 
          type="text" 
          inputmode="decimal" 
          class="calc-input" 
          id="input-${stepIdx}" 
          placeholder="Betrag in € eingeben" 
        />
      </div>
    `;
  } else {
    // Button Options Step
    html += `<div class="options-grid">`;
    step.options.forEach((opt, optIdx) => {
      html += `
        <button class="option-btn" id="opt-${stepIdx}-${optIdx}" onclick="selectOption(${stepIdx}, ${optIdx}, '${step.type}')">
          ${opt.txt}
          <span class="checkbox-indicator"></span>
        </button>
      `;
    });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

window.selectOption = function(stepIdx, optIdx, type) {
  if(document.getElementById('btn-check').disabled) return;

  const btn = document.getElementById(`opt-${stepIdx}-${optIdx}`);
  
  if (type === 'multi') {
    btn.classList.toggle('selected');
  } else if (type === 'single') {
    // Clear others
    const all = document.querySelectorAll(`[id^='opt-${stepIdx}-']`);
    all.forEach(el => el.classList.remove('selected'));
    btn.classList.add('selected');
  }
}

window.checkCase = function() {
  const data = cases[currentCaseIndex];
  const fbArea = document.getElementById('feedback-area');
  fbArea.innerHTML = '';
  let allCorrect = true;

  data.steps.forEach((step, stepIdx) => {
    let stepCorrect = false;
    let userValDisplay = "";

    if (step.type === 'multi') {
      const opts = step.options;
      let wrongSelection = false;
      let missedCorrect = false;

      opts.forEach((o, oIdx) => {
        const el = document.getElementById(`opt-${stepIdx}-${oIdx}`);
        const isSel = el.classList.contains('selected');
        if (o.correct && !isSel) missedCorrect = true;
        if (!o.correct && isSel) wrongSelection = true;
        
        // Markierung visuell einfrieren
        if(o.correct) el.style.borderColor = "var(--success)";
        if(isSel && !o.correct) el.style.borderColor = "var(--danger)";
      });
      stepCorrect = !wrongSelection && !missedCorrect;

    } else if (step.type === 'single') {
      const opts = step.options;
      let selectedIdx = -1;
      opts.forEach((o, oIdx) => {
        const el = document.getElementById(`opt-${stepIdx}-${oIdx}`);
        if(el.classList.contains('selected')) selectedIdx = oIdx;
        if(o.correct) el.style.borderColor = "var(--success)";
      });

      if (selectedIdx !== -1 && opts[selectedIdx].correct) stepCorrect = true;

    } else if (step.type === 'input') {
      const inp = document.getElementById(`input-${stepIdx}`);
      // Komma zu Punkt konvertieren für JS float
      let valStr = inp.value.replace(',', '.');
      let userVal = parseFloat(valStr);
      userValDisplay = isNaN(userVal) ? "keine Eingabe" : userVal.toLocaleString('de-DE') + " €";

      if (!isNaN(userVal)) {
        // Toleranzbereich für Rundungsdifferenzen
        if (Math.abs(userVal - step.correctVal) < 1.0) stepCorrect = true;
        // Optional: Akzeptiere auch negativen Wert wenn 0 erwartet wird (oder umgekehrt, je nach Logik)
        if (step.altCorrectVal !== undefined && Math.abs(userVal - step.altCorrectVal) < 1.0) stepCorrect = true;
      }
      inp.disabled = true;
      inp.style.borderColor = stepCorrect ? "var(--success)" : "var(--danger)";
    }

    // Feedback rendern
    const fbCard = document.createElement('div');
    fbCard.className = `feedback-card ${stepCorrect ? 'fb-correct' : 'fb-wrong'}`;
    
    let icon = stepCorrect ? '✅' : '❌';
    let title = `<strong>${step.label}</strong>`;
    
    if (step.type === 'input' && !stepCorrect) {
      title += `<br>Ihre Eingabe: ${userValDisplay} <br>Lösung: ${step.correctVal} €`;
    } else {
      title += `: ${stepCorrect ? 'Korrekt' : 'Fehlerhaft'}`;
    }

    fbCard.innerHTML = `
      <div>${icon} ${title}</div>
      <span class="math-detail">${step.explain}</span>
    `;
    fbArea.appendChild(fbCard);

    if (!stepCorrect) allCorrect = false;
  });

  // Buttons umschalten
  document.getElementById('btn-check').disabled = true;
  document.getElementById('btn-next').disabled = false;
  document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');
	
	if (allCorrect) {
  caseStatus = "Bestanden";
} else {
  caseStatus = "Fehlerhaft";
}

document.getElementById("progress-status").textContent = 
  "Status: " + caseStatus;
  
  // Automatisches Scrollen zum Feedback
  fbArea.scrollIntoView({ behavior: 'smooth' });
}

window.nextCase = function() {
  if (currentCaseIndex < cases.length - 1) {
    currentCaseIndex++;
    caseStatus = "Offen";
    renderCase();
    window.scrollTo(0, 0);
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('app-content').innerHTML = `
    <div style="text-align:center; padding: 40px 0;">
      <h1 style="color:var(--primary)">Simulation Beendet</h1>
      <div style="font-size: 4rem; margin: 20px 0; text-shadow:0 0 30px var(--primary)">DONE</div>
      <p style="color:var(--text-dim); margin-bottom:30px">Alle Fälle wurden bearbeitet.</p>
      <button class="btn-main" onclick="location.reload()" style="width:100%">Neustart</button>
    </div>
  `;
}

// =============================================
// THEME & CANVAS
// =============================================
let currentThemeColor = [0, 229, 255]; // Standard Blau

window.setTheme = function(theme) {
  document.body.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active'); // Event ist global verfügbar im inline call
  
  const colors = {
    'blue': [0, 229, 255],
    'orange': [255, 149, 0],
    'green': [0, 255, 136]
  };
  currentThemeColor = colors[theme];
}

// Canvas Setup
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Init Particles
for(let i=0; i<50; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    s: Math.random() * 2 + 1,
    dy: Math.random() * 0.5 + 0.2
  });
}

function animateCanvas() {
  ctx.clearRect(0,0,canvas.width, canvas.height);
  
  // Performance: Farbe nur einmal setzen pro Frame
  ctx.fillStyle = `rgba(${currentThemeColor[0]}, ${currentThemeColor[1]}, ${currentThemeColor[2]}, 0.3)`;
  
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
    ctx.fill();
    p.y -= p.dy;
    if(p.y < 0) {
      p.y = canvas.height;
      p.x = Math.random() * canvas.width;
    }
  });
  
  requestAnimationFrame(animateCanvas);
}

// Start
init();

</script>
